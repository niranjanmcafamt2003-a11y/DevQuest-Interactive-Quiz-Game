<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DevQuest - Developer Quiz Game</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

</head>

<body>

    <!-- MAIN CONTAINER -->

    <div class="container">

        <h1 class="game-title">⚡ DevQuest</h1>

        <p class="subtitle">
            Level Up Your Developer Skills
        </p>

        <!-- GAME MENU -->

        <div class="menu">

            <a href="game.html" class="btn start-btn">
                Start Game
            </a>

            <a href="leaderboard.html" class="btn leaderboard-btn">
                Leaderboard
            </a>

        </div>


        <!-- STAGES -->

        <h2 class="stage-title">Choose Your Stage</h2>

        <div class="stage-container">

            <a href="stage.html?stage=1" class="stage-card">
                <h3>Stage 1</h3>
                <p>HTML Fundamentals</p>
                <span class="badge">10 Levels</span>
            </a>

            <a href="stage.html?stage=2" class="stage-card">
                <h3>Stage 2</h3>
                <p>CSS Styling</p>
                <span class="badge">10 Levels</span>
            </a>

            <a href="stage.html?stage=3" class="stage-card">
                <h3>Stage 3</h3>
                <p>JavaScript Logic</p>
                <span class="badge">10 Levels</span>
            </a>

            <div class="stage-card locked">
                <h3>Stage 4</h3>
                <p>React Basics</p>
                <span class="badge">Locked</span>
            </div>

        </div>

    </div>


    <!-- FOOTER -->

    <footer>

        <p>© 2026 DevQuest Game | Built by Niranjan Surve</p>

    </footer>

</body>

</html>
